<section class="page-section">
  <div class="container">
    <div class="send-WhatsApp-header">
      <div>
        <h1>Send WhatsApp</h1>
        <p>
          Choose whether you want to schedule birthday WhatsApp reminders or send messages immediately.
        </p>
      </div>
    </div>

    <!-- FIRST SCREEN -->
    <div id="WhatsAppModeChooser" class="WhatsApp-mode-chooser">
      <button id="WhatsAppScheduleModeBtn" type="button" class="WhatsApp-mode-card">
        <span class="WhatsApp-mode-icon">📅</span>
        <strong>Schedule</strong>
        <small>
          Upload the generated monthly workbook and prepare WhatsApp reminders one month in advance.
        </small>
      </button>

      <button id="WhatsAppSendNowModeBtn" type="button" class="WhatsApp-mode-card">
        <span class="WhatsApp-mode-icon">⚡</span>
        <strong>Send Right Now</strong>
        <small>
          Send a WhatsApp message immediately without using the one-month reminder schedule.
        </small>
      </button>
    </div>

    <!-- SCHEDULE FLOW -->
    <div id="WhatsAppSchedulePanel" class="WhatsApp-mode-panel hidden">
      <button id="backToWhatsAppModesBtn" type="button" class="WhatsApp-back-btn">
        ← Back
      </button>

      <div class="send-WhatsApp-upload-box">
        <label class="send-WhatsApp-label" for="WhatsAppFileInput">
          Upload Excel file (.xlsx only)
        </label>

        <input type="file" id="WhatsAppFileInput" accept=".xlsx" multiple />

        <div id="WhatsAppSelectedFile" class="WhatsApp-selected-file"></div>

        <div id="WhatsAppErrorLabel" class="WhatsApp-error-label" aria-live="polite"></div>

        <button id="processWhatsAppFileBtn" type="button">
          Process File
        </button>
      </div>

      <div id="WhatsAppReportContainer" class="WhatsApp-report-container"></div>
    </div>

    <!-- SEND RIGHT NOW FLOW -->
    <div id="WhatsAppSendNowPanel" class="WhatsApp-mode-panel hidden">
      <button id="backToWhatsAppModesFromNowBtn" type="button" class="WhatsApp-back-btn">
        ← Back
      </button>

      <div class="send-WhatsApp-upload-box">
        <h2>Send Right Now</h2>
        <p class="WhatsApp-summary-note">
          Upload any Excel file, detect phone numbers, remove people if needed,
          write the message, and save the WhatsApp action with the current date and time.
        </p>

        <label class="send-WhatsApp-label" for="sendNowFileInput">
          Upload Excel file (.xlsx only)
        </label>

        <input type="file" id="sendNowFileInput" accept=".xlsx" multiple />

        <div id="sendNowSelectedFile" class="WhatsApp-selected-file"></div>

        <div id="sendNowErrorLabel" class="WhatsApp-error-label" aria-live="polite"></div>

        <button id="processSendNowFileBtn" type="button">
          Process File
        </button>
      </div>

      <div id="sendNowReportContainer" class="WhatsApp-report-container"></div>
    </div>
  </div>
</section>
