<section class="page-section">
  <div class="container">
    <div class="file-fixer-header">
      <div>
        <h1>File Fixer</h1>
        <p>
          Upload messy company Excel files, clean them, or organize rows into keyword-based sheets.
        </p>
      </div>
    </div>

    <div class="file-fixer-main-mode-grid">
      <button id="fixMessedFileModeBtn" type="button" class="file-fixer-main-mode-card active">
        <strong>Fix Messed Up File</strong>
        <small>Clean messy company files using the current File Fixer system.</small>
      </button>

      <button id="organizeFilterModeBtn" type="button" class="file-fixer-main-mode-card">
        <strong>Organize and Filter Messed Up File</strong>
        <small>Classify every row into different sheets based on keywords.</small>
      </button>
    </div>

    <div id="fixMessedFileSection">
      <div class="file-fixer-mode-grid">
        <button id="sameSheetsModeBtn" type="button" class="file-fixer-mode-card active">
          <strong>Same number of sheets</strong>
          <small>Keep the workbook sheets separated like the original file.</small>
        </button>

        <button id="oneSheetModeBtn" type="button" class="file-fixer-mode-card">
          <strong>All sheets in one sheet</strong>
          <small>Merge all fixed rows into one cleaned sheet.</small>
        </button>
      </div>

      <div class="file-fixer-upload-box">
        <label class="file-fixer-label" for="fileFixerInput">
          Upload Excel file (.xlsx only)
        </label>

        <input type="file" id="fileFixerInput" accept=".xlsx" multiple />

        <div id="fileFixerSelectedFiles" class="file-fixer-selected-file"></div>

        <div id="fileFixerErrorLabel" class="file-fixer-error-label" aria-live="polite"></div>

        <button id="processFileFixerBtn" type="button">
          Process File
        </button>
      </div>
    </div>

    <div id="organizeFilterSection" class="file-fixer-hidden">
      <div class="file-fixer-upload-box">
        <label class="file-fixer-label" for="organizeFilterInput">
          Upload one messy Excel file (.xlsx only)
        </label>

        <input type="file" id="organizeFilterInput" accept=".xlsx" />

        <div id="organizeFilterSelectedFile" class="file-fixer-selected-file"></div>

        <div id="organizeFilterErrorLabel" class="file-fixer-error-label" aria-live="polite"></div>

        <button id="processOrganizeFilterBtn" type="button">
          Organize and Filter File
        </button>
      </div>
    </div>

    <div id="fileFixerReportContainer" class="file-fixer-report-container"></div>
  </div>
</section>
